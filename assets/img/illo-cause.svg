<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240">
  <defs>
    <style>
      .doarrow{animation:blink 4s ease-in-out infinite}
      @keyframes blink{0%,28%,100%{opacity:.25}46%,58%{opacity:1}}
      .diverge{stroke-dasharray:200;animation:draw 4s ease-in-out infinite}
      @keyframes draw{0%,30%{stroke-dashoffset:200}66%,100%{stroke-dashoffset:0}}
      .tip{animation:blink2 4s ease-in-out infinite}
      @keyframes blink2{0%,55%{opacity:0}75%,100%{opacity:1}}
      @media(prefers-reduced-motion:reduce){*{animation:none!important;stroke-dashoffset:0!important;opacity:1!important}}
    </style>
  </defs>
  <path d="M 30 130 C 70 90 100 90 140 130 C 170 160 190 160 210 130" fill="none" stroke="#4FD8C4" stroke-width="3" stroke-linecap="round"/>
  <path d="M 30 130 C 70 90 100 90 140 130 C 170 160 190 160 210 130" fill="none" stroke="#59A9EE" stroke-width="3" stroke-linecap="round" transform="translate(0,5)" opacity=".8"/>
  <g class="doarrow" stroke="#8a867c" fill="none">
    <line x1="240" y1="40" x2="240" y2="190" stroke-width="1.6" stroke-dasharray="4 4"/>
    <path d="M 232 178 L 240 192 L 248 178" stroke-width="1.6"/>
  </g>
  <path class="diverge" d="M 270 130 C 330 130 360 90 445 60" fill="none" stroke="#4FD8C4" stroke-width="3" stroke-linecap="round"/>
  <path class="diverge" d="M 270 130 C 330 130 360 150 445 150" fill="none" stroke="#59A9EE" stroke-width="3" stroke-linecap="round"/>
  <circle class="tip" cx="445" cy="60" r="4" fill="#4FD8C4"/><circle class="tip" cx="445" cy="150" r="4" fill="#59A9EE"/>
</svg>
