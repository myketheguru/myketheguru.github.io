<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="nav">
    <a class="nav__brand" href="{{ '/' | relative_url }}">
      <span class="nav__mono">ME</span><span class="nav__name">Micheal Ezeoda</span>
    </a>
    <button class="nav__toggle" aria-label="Menu"><span></span><span></span></button>
    <nav class="nav__links">
      <a href="{{ '/#about' | relative_url }}">About</a>
      <a href="{{ '/#experience' | relative_url }}">Experience</a>
      <a href="{{ '/#work' | relative_url }}">Work</a>
      <a href="{{ '/#writing' | relative_url }}">Research</a>
      <a href="{{ '/#contact' | relative_url }}">Contact</a>
    </nav>
  </header>

  <main>{{ content }}</main>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__name">Micheal Ezeoda</span>
      <span class="footer__meta">Engineer · Consultant · Researcher — <span data-year>2026</span></span>
      <a class="footer__top" href="#top">Back to top ↑</a>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
