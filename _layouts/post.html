---
layout: default
---
<article class="post">
  <a class="post__back" href="{{ '/#writing' | relative_url }}">← All writing</a>
  <p class="post__meta"><span class="mono">{{ page.date | date: "%B %Y" }}</span></p>
  <h1 class="post__title">{{ page.title }}</h1>
  <div class="post__body" data-reveal>
    {{ content }}
  </div>
  <a class="post__back post__back--end" href="{{ '/#writing' | relative_url }}">← All writing</a>
</article>
