<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4FD8C4"/><stop offset="1" stop-color="#59A9EE"/></linearGradient>
    <style>
      .arrow{animation:nudge 2.6s ease-in-out infinite}
      @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
      .curve{stroke-dasharray:180;animation:draw 4s ease-in-out infinite}
      .curve:nth-of-type(2){animation-delay:.3s}.curve:nth-of-type(3){animation-delay:.6s}.curve:nth-of-type(4){animation-delay:.9s}
      @keyframes draw{0%,20%{stroke-dashoffset:180}70%,100%{stroke-dashoffset:0}}
      @media(prefers-reduced-motion:reduce){*{animation:none!important;stroke-dashoffset:0!important}}
    </style>
  </defs>
  <g stroke="#3a3730" stroke-width="1.3">
    <line x1="40" y1="60" x2="180" y2="60"/><line x1="40" y1="100" x2="180" y2="100"/>
    <line x1="40" y1="140" x2="180" y2="140"/><line x1="40" y1="180" x2="180" y2="180"/>
    <line x1="60" y1="50" x2="60" y2="190"/><line x1="100" y1="50" x2="100" y2="190"/>
    <line x1="140" y1="50" x2="140" y2="190"/><line x1="180" y1="50" x2="180" y2="190"/>
  </g>
  <g class="arrow" stroke="#8a867c" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="205" y1="120" x2="250" y2="120"/><path d="M 240 111 L 252 120 L 240 129"/>
  </g>
  <circle cx="355" cy="120" r="82" fill="none" stroke="#26262b" stroke-width="1.5"/>
  <g stroke="url(#g2)" stroke-width="1.8" fill="none" stroke-linecap="round">
    <path class="curve" d="M 283 96 A 120 120 0 0 1 419 84"/>
    <path class="curve" d="M 288 150 A 130 130 0 0 0 424 152"/>
    <path class="curve" d="M 316 45 A 120 120 0 0 1 322 196"/>
    <path class="curve" d="M 392 46 A 120 120 0 0 0 388 196"/>
  </g>
</svg>
