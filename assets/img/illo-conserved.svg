  <path class="surface" d="M 30 150 C 90 150 96 176 150 176 C 210 176 208 116 268 116 C 326 116 336 150 396 150 L 452 150" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
