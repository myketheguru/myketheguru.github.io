<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240">
  <defs>
    <linearGradient id="g" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#4FD8C4"/><stop offset="1" stop-color="#59A9EE"/></linearGradient>
    <style>
      .road{stroke-dasharray:230;animation:draw 3.6s ease-in-out infinite}
      @keyframes draw{0%{stroke-dashoffset:230}45%,70%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
      .tip{animation:show 3.6s ease-in-out infinite}
      @keyframes show{0%,42%{opacity:0}55%,100%{opacity:1}}
      .seed{animation:beat 3.6s ease-in-out infinite}
      @keyframes beat{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.25);opacity:1}}
      .seed{transform-box:view-box;transform-origin:240px 205px}
      @media(prefers-reduced-motion:reduce){*{animation:none!important;stroke-dashoffset:0!important;opacity:1!important}}
    </style>
  </defs>
  <path class="road" d="M 240 200 C 200 150 150 120 96 66" fill="none" stroke="#4FD8C4" stroke-width="3" stroke-linecap="round"/>
  <path class="tip" d="M 88 78 L 92 60 L 104 72" fill="none" stroke="#4FD8C4" stroke-width="3"/>
  <path class="road" d="M 240 200 C 280 150 330 120 384 66" fill="none" stroke="#59A9EE" stroke-width="3" stroke-linecap="round"/>
  <path class="tip" d="M 376 72 L 388 60 L 392 78" fill="none" stroke="#59A9EE" stroke-width="3"/>
  <path d="M 96 66 C 120 40 150 34 180 40" fill="none" stroke="#4FD8C4" stroke-width="1.6" stroke-dasharray="3 6" opacity=".5"/>
  <path d="M 384 66 C 360 40 330 34 300 40" fill="none" stroke="#59A9EE" stroke-width="1.6" stroke-dasharray="3 6" opacity=".5"/>
  <circle class="seed" cx="240" cy="205" r="6" fill="url(#g)"/>
</svg>
