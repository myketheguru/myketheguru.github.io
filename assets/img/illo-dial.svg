<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="'Space Mono', monospace">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#4FD8C4"/><stop offset="1" stop-color="#59A9EE"/></linearGradient>
    <style>
      .needle{transform-box:view-box;transform-origin:240px 178px;animation:sweep 5.5s ease-in-out infinite}
      @keyframes sweep{0%,100%{transform:rotate(-62deg)}50%{transform:rotate(62deg)}}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <path d="M 96 178 A 144 144 0 0 1 384 178" fill="none" stroke="#26262b" stroke-width="3"/>
  <path d="M 96 178 A 144 144 0 0 1 384 178" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-dasharray="452" stroke-dashoffset="0" opacity=".55"/>
  <g stroke="#4a463f" stroke-width="2" stroke-linecap="round">
    <line x1="240" y1="40" x2="240" y2="54"/><line x1="140" y1="80" x2="150" y2="90"/><line x1="340" y1="80" x2="330" y2="90"/>
  </g>
  <line class="needle" x1="240" y1="178" x2="240" y2="70" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="240" cy="178" r="7" fill="#4FD8C4"/>
  <text x="86" y="212" font-size="14" letter-spacing="1.5" fill="#4FD8C4">ACCESS</text>
  <text x="330" y="212" font-size="14" letter-spacing="1.5" fill="#59A9EE">SEARCH</text>
</svg>
